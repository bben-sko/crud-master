project:
  name: movie-streaming-platform
  description: API Gateway, Inventory API, and Billing worker deployed across three Vagrant VMs

services:
  api_gateway:
    host: 127.0.0.1
    port: 3000
    routes:
      - /api/movies
      - /api/movies/{id}
      - /api/billing
  inventory_api:
    host: 127.0.0.1
    port: 8080
    database: movies_db
  billing_worker:
    rabbitmq_queue: billing_queue
    database: billing_db

virtual_machines:
  gateway-vm:
    private_ip: 192.168.56.10
  inventory-vm:
    private_ip: 192.168.56.11
  billing-vm:
    private_ip: 192.168.56.12
